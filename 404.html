<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/style/costom.css">
    <title>404 Not Found</title>
</head>
<body>
    <div class="container">
        <h1 class="notfound">Σ( °△ ° ||) 居然什么都没找到！</h1>

        <div class="button-group">
            <a href="/" class="btn-link">返回首页</a>
            <a href="javascript:history.back()" class="btn-link">返回上一页</a>
        </div>
    </div>

    <script>
        // 优先读取本地存储设置，如果没有则跟随系统
        const theme = localStorage.getItem('darkMode');
        if (theme === 'true') {
            document.body.classList.add('dark-mode');
        } else if (theme === 'false') {
            document.body.classList.remove('dark-mode');
        }
    </script>
</body>
</html>
